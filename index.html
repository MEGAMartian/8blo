<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8BLO • Visualization Lab</title>
  <style>
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      margin: 0; padding: 20px; 
      background: linear-gradient(135deg, #0a0a0a, #1a1a2e); 
      color: #eee; 
    }
    .container { 
      max-width: 1100px; margin: 0 auto; 
      background: rgba(255,255,255,0.06); 
      padding: 40px; border-radius: 20px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
    }
    h1 { text-align: center; margin-bottom: 40px; font-size: 2.5em; color: #fff; }
    .section { margin-bottom: 45px; }
    h3 { margin-bottom: 18px; color: #ddd; font-weight: 500; }
    .options { display: flex; flex-wrap: wrap; gap: 12px; }
    button { 
      padding: 14px 22px; 
      background: #2a2a2a; color: white; 
      border: none; border-radius: 12px; 
      cursor: pointer; font-size: 15px; 
      transition: all 0.25s; 
    }
    button:hover, button.active { 
      background: #0066ff; 
      transform: translateY(-4px); 
      box-shadow: 0 8px 20px rgba(0,102,255,0.3); 
    }
    textarea { 
      width: 100%; height: 110px; padding: 16px; 
      background: rgba(255,255,255,0.08); 
      border: 1px solid rgba(255,255,255,0.15); 
      border-radius: 12px; color: white; font-size: 16px; 
    }
    .generate-btn { 
      background: #00cc77; font-size: 18px; padding: 18px; 
      margin-top: 30px; width: 100%; border-radius: 12px; 
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>8BLO • Visualization Lab</h1>

    <div class="section">
      <h3>Character Description</h3>
      <textarea id="description" placeholder="Paste or edit full description here..."></textarea>
    </div>

    <div class="section">
      <h3>Quick Presets</h3>
      <div class="options">
        <button onclick="loadPreset(1)">Natural 49yo</button>
        <button onclick="loadPreset(2)">Significant Ptosis</button>
        <button onclick="loadPreset(3)">Post-Pregnancy</button>
        <button onclick="loadPreset(4)">Deep Brown Skin</button>
      </div>
    </div>

    <div class="section">
      <button class="generate-btn" onclick="copyKitchenClothed()">Kitchen Scene - Clothed</button>
      <button class="generate-btn" onclick="copyKitchenNude()">Kitchen Scene - Topless</button>
      <button class="generate-btn" onclick="copyContactSheet()">Contact Sheet</button>
      <button class="generate-btn" onclick="copySingle()">Single Portrait</button>
    </div>
  </div>

  <script>
    const baseKitchen = `Wide angle lens, photorealistic modern kitchen scene. Three triplet sisters who look nearly identical, standing naturally around a large kitchen island as if casually talking to each other. The island is approximately ten feet long and waist height. The three women are clearly separated with natural spacing. One at the far end facing forward, one at the corner in 3/4 view, one on the long side in profile. Camera at chest level, bright clean lighting.`;

    function loadPreset(n) {
      const d = document.getElementById('description');
      if (n===1) d.value = "49-year-old woman with fair skin, significant natural ptosis, full lower pole with low upper pole volume, strong east-west breast orientation, shoulder-length wavy brown hair";
      if (n===2) d.value = "49-year-old woman with very pendulous breasts, significant natural ptosis, full lower pole, minimal upper pole, strong east-west orientation, shoulder-length wavy brown hair";
      if (n===3) d.value = "47-year-old woman with post-pregnancy changes, noticeable ptosis, loose stomach skin, full lower pole, shoulder-length wavy brown hair";
      if (n===4) d.value = "49-year-old woman with deep brown skin, significant natural ptosis, full lower pole, low upper pole volume, strong east-west orientation, shoulder-length wavy black hair";
    }

    function copyKitchenClothed() {
      const desc = document.getElementById('description').value.trim();
      if (!desc) return alert("Please enter a character description");
      navigator.clipboard.writeText(baseKitchen + "\n\n" + desc + ", wearing fitted white ribbed tank top and black biker shorts");
      alert("✅ Kitchen Clothed prompt copied!");
    }

    function copyKitchenNude() {
      const desc = document.getElementById('description').value.trim();
      if (!desc) return alert("Please enter a character description");
      navigator.clipboard.writeText(baseKitchen + "\n\n" + desc + ", completely topless, wearing only black biker shorts");
      alert("✅ Kitchen Topless prompt copied!");
    }

    function copyContactSheet() {
      const desc = document.getElementById('description').value.trim();
      if (!desc) return alert("Please enter a character description");
      navigator.clipboard.writeText("Contact sheet, photorealistic, multiple professional poses of the exact same woman in a luxurious modern apartment with large windows and city skyline view at dusk. Show a good mix of clothed and topless shots. Include front view, side profiles, 3/4 angles, arms raised, hands on hips, looking over shoulder, and back views. Clean, high detail, consistent face and body across all images, natural realistic lighting.\n\n" + desc);
      alert("✅ Contact Sheet prompt copied!");
    }

    function copySingle() {
      const desc = document.getElementById('description').value.trim();
      if (!desc) return alert("Please enter a character description");
      navigator.clipboard.writeText("Photorealistic portrait of " + desc + ", standing in modern apartment with city view at night, soft cinematic lighting");
      alert("✅ Single Portrait prompt copied!");
    }
  </script>
</body>
</html>
