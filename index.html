<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8BLO • Visualization Lab</title>
  <style>
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      margin: 0; padding: 20px; 
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e); 
      color: #eee; 
    }
    .container { 
      max-width: 1100px; margin: 0 auto; 
      background: rgba(255,255,255,0.05); 
      padding: 40px; border-radius: 16px; 
      box-shadow: 0 8px 32px rgba(0,0,0,0.4); 
    }
    h1 { text-align: center; margin-bottom: 30px; font-size: 2.4em; }
    .section { margin-bottom: 40px; }
    h3 { margin-bottom: 15px; color: #ddd; }
    .options { display: flex; flex-wrap: wrap; gap: 12px; }
    button { 
      padding: 14px 20px; 
      background: #333; color: white; 
      border: none; border-radius: 10px; 
      cursor: pointer; font-size: 15px; 
      transition: all 0.2s; 
    }
    button:hover, button.active { 
      background: #0066ff; 
      transform: translateY(-3px); 
      box-shadow: 0 6px 16px rgba(0,102,255,0.4); 
    }
    textarea { 
      width: 100%; height: 100px; padding: 14px; 
      background: rgba(255,255,255,0.1); 
      border: 1px solid rgba(255,255,255,0.2); 
      border-radius: 8px; color: white; 
    }
    .generate-btn { 
      background: #00cc66; font-size: 18px; padding: 16px 32px; 
      margin-top: 20px; width: 100%; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>8BLO • Visualization Lab</h1>

    <!-- Section 1: Body Frame -->
    <div class="section">
      <h3>1. Body Frame</h3>
      <div class="options" id="bodyFrame">
        <button onclick="selectSingle(this)">Slim Feminine</button>
        <button onclick="selectSingle(this)">Average Feminine</button>
        <button onclick="selectSingle(this)">Broad Shoulders</button>
        <button onclick="selectSingle(this)">Curvy</button>
        <button onclick="selectSingle(this)">Fuller Figure</button>
      </div>
    </div>

    <!-- Section 2: Breast Goal -->
    <div class="section">
      <h3>2. Breast Goal</h3>
      <div class="options" id="breastGoal">
        <button onclick="selectSingle(this)">Natural</button>
        <button onclick="selectSingle(this)">Subtle Enhancement</button>
        <button onclick="selectSingle(this)">Full Round</button>
        <button onclick="selectSingle(this)">Obvious Implants</button>
      </div>
    </div>

    <!-- Section 3: Additional Characteristics (Multiple) -->
    <div class="section">
      <h3>3. Additional Characteristics (select all that apply)</h3>
      <div class="options" id="characteristics">
        <button onclick="toggleSelect(this)">Significant Ptosis</button>
        <button onclick="toggleSelect(this)">Post-Pregnancy Changes</button>
        <button onclick="toggleSelect(this)">Breast Lift (Anchor Scars)</button>
        <button onclick="toggleSelect(this)">Trans Feminine Features</button>
      </div>
    </div>

    <textarea id="custom" placeholder="Additional details (hair, skin tone, age, etc.)"></textarea>

    <button class="generate-btn" onclick="generatePrompt()">Copy Full Prompt</button>
  </div>

  <script>
    function selectSingle(btn) {
      const parent = btn.parentElement;
      Array.from(parent.children).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function toggleSelect(btn) {
      btn.classList.toggle('active');
    }

    function generatePrompt() {
      const body = Array.from(document.querySelectorAll('#bodyFrame button.active')).map(b => b.textContent).join(", ");
      const goal = Array.from(document.querySelectorAll('#breastGoal button.active')).map(b => b.textContent).join(", ");
      const chars = Array.from(document.querySelectorAll('#characteristics button.active')).map(b => b.textContent).join(", ");
      const custom = document.getElementById('custom').value.trim();

      let prompt = `Photorealistic image of a woman with ${body || "average feminine frame"}. Breast goal: ${goal || "natural"}. ${chars ? chars + ". " : ""}${custom ? custom + "." : ""} High detail, natural lighting.`;

      navigator.clipboard.writeText(prompt);
      alert("✅ Prompt copied to clipboard!");
    }
  </script>
</body>
</html>
